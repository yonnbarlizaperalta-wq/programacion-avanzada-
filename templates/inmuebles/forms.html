{% extends 'base.html' %}

{% block contenido %}
<div class="form-container" style="max-width: 600px; margin: 30px auto; padding: 25px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px; color: #333;">Registrar Nuevo Inmueble</h2>
    
    <!-- El atributo enctype es obligatorio para poder subir imágenes o archivos -->
    <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        
        <!-- Renderiza de forma automática y ordenada todos los campos del formulario de Django -->
        <div class="django-form-fields" style="display: flex; flex-direction: column; gap: 10px;">
            {{ form.as_p }}
        </div>

        <!-- Botones de Acción -->
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <a href="/inmuebles/" style="padding: 10px 15px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px;">Cancelar</a>
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Guardar Inmueble</button>
        </div>
    </form>
</div>
{% endblock %}
